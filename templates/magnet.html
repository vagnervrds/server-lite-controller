<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Magnet Links</title>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        /* Estilos específicos para a página de magnet links */
        .subtitle {
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }

        .btn {
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #0078d4;
            color: white;
        }

        .btn-primary:hover {
            background-color: #005a9e;
        }

        .btn-primary:disabled {
            background-color: #3c3c3c;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .btn-success:disabled {
            background-color: #3c3c3c;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid;
        }

        .alert-error {
            background-color: #8b0000;
            border-color: #dc3545;
            color: #f5b7b1;
        }

        .alert-success {
            background-color: #1e692e;
            border-color: #28a745;
            color: #b7eb8f;
        }

        .alert-info {
            background-color: #17a2b8;
            border-color: #20c997;
            color: #b7e4f5;
        }

        /* Animação de Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #d4d4d4;
        }

        .loading.active {
            display: block;
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #3c3c3c;
            border-top: 4px solid #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-dots {
            font-size: 18px;
            font-weight: 500;
            color: #0078d4;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        .loading-subtitle {
            color: #b3b3b3;
            font-size: 13px;
            margin-top: 10px;
        }

        /* Seção de resultados */
        .results {
            display: none;
            margin-top: 30px;
        }

        .results.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3c3c3c;
            flex-wrap: wrap;
            gap: 10px;
        }

        .results-title {
            font-size: 18px;
            font-weight: 600;
            color: #d4d4d4;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .select-controls {
            display: flex;
            gap: 15px;
        }

        .link-select {
            font-size: 13px;
            color: #0078d4;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.3s;
        }

        .link-select:hover {
            color: #005a9e;
        }

        .magnet-list {
            margin-bottom: 20px;
        }

        .magnet-item {
            background-color: #2d2d2d;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.3s;
        }

        .magnet-item:hover {
            background-color: #3d3d3d;
            border-color: #0078d4;
        }

        .checkbox-wrapper {
            padding-top: 2px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #0078d4;
        }

        .magnet-content {
            flex: 1;
            min-width: 0;
        }

        .magnet-title {
            font-weight: 500;
            color: #d4d4d4;
            margin-bottom: 6px;
            font-size: 14px;
            word-break: break-word;
        }

        .magnet-link {
            font-size: 12px;
            color: #888;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .send-section {
            border-top: 1px solid #3c3c3c;
            padding-top: 20px;
            margin-top: 20px;
        }

        .send-status {
            margin-top: 20px;
            display: none;
        }

        .send-status.active {
            display: block;
        }

        .status-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid;
        }

        .status-item.success {
            background-color: #1e692e;
            border-color: #28a745;
            color: #b7eb8f;
        }

        .status-item.info {
            background-color: #1a5a7c;
            border-color: #17a2b8;
            color: #b7e4f5;
        }

        .status-item.error {
            background-color: #8b0000;
            border-color: #dc3545;
            color: #f5b7b1;
        }

        .status-icon {
            font-weight: bold;
            font-size: 16px;
        }

        .counter {
            background-color: #0078d4;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .select-controls {
                width: 100%;
                justify-content: space-between;
            }

            .magnet-item {
                padding: 12px;
            }

            .spinner {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Extrator de Magnet Links</h1>
        <p class="subtitle">Extraia magnet links de qualquer página e envie para a API de torrents</p>

        <div id="alertContainer"></div>

        <div class="form-group">
            <label for="urlInput">URL da Página</label>
            <input type="text" id="urlInput" placeholder="https://exemplo.com/torrents" class="form-control">
        </div>

        <button class="btn btn-primary" id="extractBtn" onclick="extrairLinks()">
            Extrair Magnet Links
        </button>

        <div class="loading" id="loading">
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
            <p class="loading-dots">Analisando página e extraindo magnet links</p>
            <p class="loading-subtitle">Isso pode levar alguns segundos...</p>
        </div>

        <div class="results" id="results">
            <div class="results-header">
                <div class="results-title">
                    <span>Magnet Links Encontrados</span>
                    <span class="counter" id="linkCounter">0</span>
                </div>
                <div class="select-controls">
                    <span class="link-select" onclick="selecionarTodos()">Selecionar todos</span>
                    <span class="link-select" onclick="deselecionarTodos()">Desmarcar todos</span>
                </div>
            </div>

            <div class="magnet-list" id="magnetList"></div>

            <div class="send-section">
                <button class="btn btn-success" id="sendBtn" onclick="enviarParaApi()">
                    Enviar Selecionados para API
                </button>

                <div class="send-status" id="sendStatus"></div>
            </div>
        </div>
    </div>

    <script>
        let magnetLinks = [];

        function mostrarAlerta(mensagem, tipo) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = tipo === 'erro' ? 'alert-error' : tipo === 'sucesso' ? 'alert-success' : 'alert-info';

            alertContainer.innerHTML = `
                <div class="alert ${alertClass}">
                    ${mensagem}
                </div>
            `;

            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        async function extrairLinks() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();

            if (!url) {
                mostrarAlerta('Por favor, insira uma URL', 'erro');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const extractBtn = document.getElementById('extractBtn');

            loading.classList.add('active');
            results.classList.remove('active');
            extractBtn.disabled = true;

            try {
                const response = await fetch('/magnet/extrair', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.sucesso) {
                    magnetLinks = data.links;
                    exibirResultados(data.links);
                    mostrarAlerta(`✓ ${data.total} magnet links encontrados!`, 'sucesso');
                } else {
                    mostrarAlerta(`Erro: ${data.erro}`, 'erro');
                }
            } catch (error) {
                mostrarAlerta(`Erro ao processar requisição: ${error.message}`, 'erro');
            } finally {
                loading.classList.remove('active');
                extractBtn.disabled = false;
            }
        }

        function exibirResultados(links) {
            const magnetList = document.getElementById('magnetList');
            const linkCounter = document.getElementById('linkCounter');
            const results = document.getElementById('results');
            const sendStatus = document.getElementById('sendStatus');

            linkCounter.textContent = links.length;
            sendStatus.classList.remove('active');
            sendStatus.innerHTML = '';

            magnetList.innerHTML = links.map((item, index) => `
                <div class="magnet-item">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="check_${index}" checked>
                    </div>
                    <div class="magnet-content">
                        <div class="magnet-title">${item.titulo}</div>
                        <div class="magnet-link">${item.link.substring(0, 100)}${item.link.length > 100 ? '...' : ''}</div>
                    </div>
                </div>
            `).join('');

            results.classList.add('active');
        }

        function selecionarTodos() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => checkbox.checked = true);
        }

        function deselecionarTodos() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => checkbox.checked = false);
        }

        async function enviarParaApi() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const sendBtn = document.getElementById('sendBtn');
            const sendStatus = document.getElementById('sendStatus');

            const linksSelecionados = [];
            checkboxes.forEach((checkbox, index) => {
                if (checkbox.checked) {
                    linksSelecionados.push(magnetLinks[index].link);
                }
            });

            if (linksSelecionados.length === 0) {
                mostrarAlerta('Selecione pelo menos um magnet link', 'erro');
                return;
            }

            sendBtn.disabled = true;
            sendStatus.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                    </div>
                    <p style="color: #0078d4; font-weight: 500;">Enviando links para a API...</p>
                </div>
            `;
            sendStatus.classList.add('active');

            let statusHtml = '';
            let sucessos = 0;
            let falhas = 0;

            // Enviar cada link individualmente para a API
            for (let i = 0; i < linksSelecionados.length; i++) {
                const link = linksSelecionados[i];
                const titulo = magnetLinks.find(m => m.link === link)?.titulo || `Link ${i + 1}`;

                try {
                    const response = await fetch('/torrent/api/magnet', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            magnetLink: link
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        sucessos++;
                        const statusMessage = data.already_exists
                            ? `<span class="status-icon">ℹ</span><span>${titulo}: Já estava na lista</span>`
                            : `<span class="status-icon">✓</span><span>${titulo}: Adicionado com sucesso</span>`;

                        const statusClass = data.already_exists ? 'info' : 'success';

                        statusHtml += `
                            <div class="status-item ${statusClass}">
                                ${statusMessage}
                            </div>
                        `;
                    } else {
                        falhas++;
                        statusHtml += `
                            <div class="status-item error">
                                <span class="status-icon">✗</span>
                                <span>${titulo}: ${data.message || 'Erro ao enviar'}</span>
                            </div>
                        `;
                    }
                } catch (error) {
                    falhas++;
                    statusHtml += `
                        <div class="status-item error">
                            <span class="status-icon">✗</span>
                            <span>${titulo}: Erro de conexão - ${error.message}</span>
                        </div>
                    `;
                }
            }

            // Mostrar resumo
            const resumoHtml = `
                <div class="alert ${sucessos > 0 ? 'alert-success' : 'alert-error'}">
                    ✓ Processo concluído: ${sucessos} enviados com sucesso, ${falhas} falharam
                </div>
            `;

            sendStatus.innerHTML = resumoHtml + statusHtml;

            if (sucessos > 0) {
                mostrarAlerta(`✓ ${sucessos} magnet links enviados com sucesso!`, 'sucesso');
            } else {
                mostrarAlerta(`Nenhum link foi enviado com sucesso`, 'erro');
            }

            sendBtn.disabled = false;
        }

        // Permitir pressionar Enter no campo de URL
        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                extrairLinks();
            }
        });
    </script>
</body>

</html>
